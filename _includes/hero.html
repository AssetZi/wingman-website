<section class="hero">
  <div class="container hero-container">
    <div class="hero-content">
      <h1>Weight Wingman</h1>
      <p class="hero-tagline">{{ site.app.tagline }}</p>
      <p class="hero-description">Stop white-knuckling your weight cuts. Weight Wingman builds you a personalized meal plan so you can make weight without draining yourself, keep your strength on the mat, and never have cottonmouth again.</p>
      <div class="hero-actions">
        <a href="{{ site.app.app_store_url }}" class="app-store-badge" target="_blank" rel="noopener">
          <img src="{{ '/assets/images/app-store-badge.svg' | relative_url }}" alt="Download Weight Wingman on the App Store" width="200" height="60">
        </a>
        <span class="hero-platforms">Available on {{ site.app.platforms }}</span>
      </div>
    </div>
    <div class="hero-image">
      <img src="{{ '/assets/images/wingmanLogo.png' | relative_url }}" alt="Weight Wingman App Icon" width="280" height="280">
    </div>
  </div>
</section>
